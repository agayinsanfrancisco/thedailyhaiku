name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # No DB at build time — schema push + seed run at container start on
      # spica, against the linked Postgres. The build only compiles.
      - name: Build Next.js
        run: npm run build
        env:
          ADMIN_PASSWORD: ci-test-password
          SESSION_SECRET: ci-session-secret-at-least-32-chars-long!!

  deploy:
    name: Deploy to Coolify
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl --fail -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "https://app.coolify.io/api/v1/deploy?uuid=obgqd1tk0gj40rkob7lx27kb"
